<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <style>
    .et-card { border: 1px solid #d9dde2; border-radius: 10px; padding: 16px; margin-bottom: 16px; }
    .et-title { font-weight: 600; margin-bottom: 6px; font-size: 1.02rem; }
    .et-sub { color: #6c757d; font-size: 0.83rem; line-height: 1.5; margin: 0 0 14px 0; }
    .et-row { margin-bottom: 12px; }
    .et-row label { font-size: 0.85rem; font-weight: 500; display: block; margin-bottom: 4px; }
    .et-row .et-hint { color: #8a9099; font-size: 0.76rem; margin-top: 3px; }
    .et-check { display: flex; align-items: center; gap: 8px; margin: 10px 0; font-size: 0.88rem; }
    .et-adv summary { cursor: pointer; color: #6c757d; font-size: 0.85rem; margin: 6px 0; }
    .et-result { margin-top: 12px; padding: 10px 12px; border-radius: 8px; font-size: 0.88rem; line-height: 1.5; display: none; }
    .et-result.show { display: block; }
    .et-result.ok   { background: #e6f4ea; color: #1e7e34; border: 1px solid #bfe3c9; }
    .et-result.none { background: #fdecea; color: #b02a37; border: 1px solid #f3c4c0; }
    .et-result.wait { background: #fff6e5; color: #946200; border: 1px solid #f0dcb0; }
  </style>
</head>
<body>
  <div class="et-card">
    <div class="et-title">EnerTalk 설정</div>
    <p class="et-sub">
      에너톡 앱 이메일/비밀번호를 입력하고 <b>연결 테스트</b>로 확인한 뒤, 하단 <b>SAVE(저장)</b> → Homebridge 재시작 하세요.
    </p>

    <div class="et-row">
      <label for="f_name">액세서리 이름 (선택)</label>
      <input type="text" id="f_name" class="form-control" placeholder="비우면 사이트 이름(예: F3000DB8) 사용">
    </div>
    <div class="et-row">
      <label for="f_email">에너톡 이메일 *</label>
      <input type="email" id="f_email" class="form-control" placeholder="you@example.com" autocomplete="off">
    </div>
    <div class="et-row">
      <label for="f_password">에너톡 비밀번호 *</label>
      <input type="password" id="f_password" class="form-control" autocomplete="off">
    </div>
    <div class="et-row">
      <label for="f_polling">실시간 폴링 주기(초)</label>
      <input type="number" id="f_polling" class="form-control" value="30" min="10" max="3600">
      <div class="et-hint">실시간 소비전력(W) 조회 주기. 권장 30초.</div>
    </div>
    <div class="et-row">
      <label for="f_billing">당월 사용량 폴링 주기(초)</label>
      <input type="number" id="f_billing" class="form-control" value="300" min="60" max="86400">
      <div class="et-hint">당월 누적(kWh)/요금 조회 주기. 권장 300초.</div>
    </div>
    <label class="et-check">
      <input type="checkbox" id="f_lux">
      <span>홈 앱용 조도센서(lux) 미러 노출 — Apple '홈' 앱에서 W/kWh 숫자를 보고 싶을 때</span>
    </label>

    <details class="et-adv">
      <summary>고급 (client_id / secret — 보통 비워둠)</summary>
      <div class="et-row" style="margin-top:8px;">
        <label for="f_cid">client_id</label>
        <input type="text" id="f_cid" class="form-control" placeholder="비우면 앱 기본값">
      </div>
      <div class="et-row">
        <label for="f_csec">client_secret</label>
        <input type="password" id="f_csec" class="form-control" placeholder="비우면 앱 기본값" autocomplete="off">
      </div>
    </details>

    <button id="etTestBtn" class="btn btn-primary btn-sm" type="button" style="margin-top:10px;">연결 테스트 / 사이트 조회</button>
    <div id="etResult" class="et-result"></div>
  </div>

  <script>
    (async () => {
      const PLATFORM = 'EnerTalkKm81';
      const $ = (id) => document.getElementById(id);
      const resultEl = $('etResult');
      const setResult = (cls, html) => { resultEl.className = 'et-result show ' + cls; resultEl.innerHTML = html; };

      // 1) 기존 설정 로드 → 폼 채우기
      let cfgs = [];
      try { cfgs = await homebridge.getPluginConfig(); } catch (e) { cfgs = []; }
      const c = (cfgs && cfgs[0]) || { platform: PLATFORM };
      $('f_name').value = c.name || '';
      $('f_email').value = c.email || '';
      $('f_password').value = c.password || '';
      $('f_polling').value = c.pollingInterval || 30;
      $('f_billing').value = c.billingInterval || 300;
      $('f_lux').checked = c.exposeLightSensors === true;
      $('f_cid').value = c.clientId || '';
      $('f_csec').value = c.clientSecret || '';

      // 2) 폼 → 플러그인 설정 반영 (하단 SAVE 버튼이 이 값을 저장)
      function collect() {
        const cfg = { platform: PLATFORM };
        const name = $('f_name').value.trim(); if (name) cfg.name = name;
        cfg.email = $('f_email').value.trim();
        cfg.password = $('f_password').value;
        cfg.pollingInterval = Number($('f_polling').value) || 30;
        cfg.billingInterval = Number($('f_billing').value) || 300;
        cfg.exposeLightSensors = $('f_lux').checked;
        const cid = $('f_cid').value.trim(); if (cid) cfg.clientId = cid;
        const csec = $('f_csec').value; if (csec) cfg.clientSecret = csec;
        return cfg;
      }
      async function sync() { try { await homebridge.updatePluginConfig([collect()]); } catch (e) { /* 저장 시 검증됨 */ } }
      ['f_name', 'f_email', 'f_password', 'f_polling', 'f_billing', 'f_cid', 'f_csec']
        .forEach((id) => $(id).addEventListener('input', sync));
      $('f_lux').addEventListener('change', sync);
      await sync(); // 초기 1회 반영(빈 설정도 platform 키 채움)

      // 3) 연결 테스트
      $('etTestBtn').addEventListener('click', async () => {
        const cfg = collect();
        if (!cfg.email || !cfg.password) {
          setResult('none', '이메일/비밀번호를 먼저 입력하세요.');
          return;
        }
        homebridge.showSpinner();
        setResult('wait', '로그인 및 조회 중…');
        try {
          const r = await homebridge.request('/test', {
            email: cfg.email, password: cfg.password, clientId: cfg.clientId, clientSecret: cfg.clientSecret,
          });
          if (!r || !r.ok) {
            setResult('none', '실패: ' + ((r && r.error) || '알 수 없는 오류'));
          } else {
            let html = '<b>연결 성공 ✓</b><br>사이트 ' + r.sites.length + '개';
            if (r.sites.length) html += ': ' + r.sites.map((s) => s.name + ' (' + String(s.id).slice(0, 8) + '…)').join(', ');
            if (r.realtime) html += '<br>실시간: <b>' + r.realtime.watts + ' W</b> / ' + r.realtime.volts + ' V / ' + r.realtime.amps + ' A';
            if (r.billing) html += '<br>당월 누적: <b>' + r.billing.kwh + ' kWh</b>' + (r.billing.charge != null ? (' / ' + r.billing.charge + '원') : '');
            setResult('ok', html);
            homebridge.toast.success('EnerTalk 연결 성공');
          }
        } catch (e) {
          setResult('none', '오류: ' + (e && e.message ? e.message : e));
        } finally {
          homebridge.hideSpinner();
        }
      });
    })();
  </script>
</body>
</html>
